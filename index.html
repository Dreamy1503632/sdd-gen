<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle Fusion HCM Solution Architect Tool - Enterprise Edition</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --oracle-red: #C74634;
            --deep-navy: #1B3B5F;
            --slate-gray: #2C3E50;
            --gold-accent: #D4AF37;
            --silver: #E8E8E8;
            --white: #FFFFFF;
            --off-white: #F8F9FA;
            --light-gray: #ECF0F1;
            --text-dark: #2C3E50;
            --success: #27AE60;
            --info: #3498DB;
            --warning: #F39C12;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: linear-gradient(135deg, #F8F9FA 0%, #E8E8E8 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, var(--deep-navy) 0%, var(--slate-gray) 100%);
            color: white;
            padding: 50px 60px;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 15px 50px rgba(27, 59, 95, 0.4);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(199, 70, 52, 0.25) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 10s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.25; }
            50% { transform: scale(1.1); opacity: 0.35; }
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            margin-bottom: 15px;
            letter-spacing: -2px;
        }

        .oracle-accent {
            color: var(--oracle-red);
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(199, 70, 52, 0.3);
        }

        .subtitle {
            font-size: 1.3rem;
            opacity: 0.95;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .version-badge {
            display: inline-block;
            background: rgba(212, 175, 55, 0.2);
            color: var(--gold-accent);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .workflow-steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .step-card {
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
            border-left: 5px solid var(--oracle-red);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .step-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(199, 70, 52, 0.03), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .step-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .step-card:hover::before {
            opacity: 1;
        }

        .step-number {
            position: absolute;
            top: -20px;
            right: 25px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--oracle-red), #E85A4A);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.3rem;
            box-shadow: 0 6px 20px rgba(199, 70, 52, 0.4);
            font-family: 'Outfit', sans-serif;
        }

        .step-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--deep-navy);
            margin-bottom: 10px;
        }

        .step-desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
        }

        .main-content {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.12);
            margin-bottom: 40px;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--deep-navy);
            margin-bottom: 35px;
            position: relative;
            padding-bottom: 20px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 80px;
            height: 5px;
            background: linear-gradient(90deg, var(--oracle-red), var(--gold-accent));
            border-radius: 3px;
        }

        .form-group {
            margin-bottom: 40px;
        }

        label {
            display: block;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--deep-navy);
            margin-bottom: 15px;
            font-family: 'Outfit', sans-serif;
        }

        select, input[type="file"], textarea {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--light-gray);
            border-radius: 10px;
            font-size: 1.05rem;
            font-family: 'IBM Plex Sans', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        select:focus, input[type="file"]:focus, textarea:focus {
            outline: none;
            border-color: var(--oracle-red);
            box-shadow: 0 0 0 4px rgba(199, 70, 52, 0.12);
        }

        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 18px;
            margin-top: 15px;
        }

        .module-checkbox {
            background: var(--off-white);
            padding: 20px 24px;
            border-radius: 12px;
            border: 3px solid var(--light-gray);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .module-checkbox:hover {
            border-color: var(--oracle-red);
            background: white;
            transform: translateX(5px);
        }

        .module-checkbox.selected {
            background: linear-gradient(135deg, rgba(199, 70, 52, 0.12), rgba(212, 175, 55, 0.12));
            border-color: var(--oracle-red);
            box-shadow: 0 4px 15px rgba(199, 70, 52, 0.2);
        }

        .module-checkbox input[type="checkbox"] {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--oracle-red);
        }

        .module-label {
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            font-size: 1.05rem;
        }

        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 18px 45px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn span {
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--oracle-red), #E85A4A);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(199, 70, 52, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--deep-navy), var(--slate-gray));
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(27, 59, 95, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #2ECC71);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(39, 174, 96, 0.4);
        }

        .btn-info {
            background: linear-gradient(135deg, var(--info), #5DADE2);
            color: white;
        }

        .btn-info:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(52, 152, 219, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .upload-area {
            border: 4px dashed var(--light-gray);
            border-radius: 16px;
            padding: 60px;
            text-align: center;
            background: var(--off-white);
            transition: all 0.4s ease;
            margin: 40px 0;
        }

        .upload-area:hover {
            border-color: var(--oracle-red);
            background: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 25px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .results-panel {
            background: linear-gradient(135deg, #F8F9FA 0%, white 100%);
            border-radius: 16px;
            padding: 40px;
            margin-top: 40px;
            border: 2px solid var(--light-gray);
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .result-item {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 18px;
            border-left: 5px solid var(--gold-accent);
            box-shadow: 0 3px 15px rgba(0,0,0,0.06);
            transition: transform 0.3s ease;
        }

        .result-item:hover {
            transform: translateX(5px);
        }

        .result-label {
            font-weight: 700;
            color: var(--deep-navy);
            margin-bottom: 10px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
        }

        .result-value {
            color: #555;
            line-height: 1.8;
        }

        .info-box {
            background: linear-gradient(135deg, rgba(27, 59, 95, 0.08), rgba(212, 175, 55, 0.08));
            border-left: 5px solid var(--deep-navy);
            padding: 30px;
            border-radius: 12px;
            margin: 35px 0;
        }

        .info-box h3 {
            color: var(--deep-navy);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 1.3rem;
        }

        .tab-container {
            margin-bottom: 50px;
        }

        .tabs {
            display: flex;
            gap: 15px;
            border-bottom: 3px solid var(--light-gray);
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 16px 35px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: #666;
            border-bottom: 4px solid transparent;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .tab:hover {
            color: var(--oracle-red);
            background: rgba(199, 70, 52, 0.05);
        }

        .tab.active {
            color: var(--oracle-red);
            border-bottom-color: var(--oracle-red);
            background: rgba(199, 70, 52, 0.08);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: var(--oracle-red);
            color: white;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-left: 12px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(27, 59, 95, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            color: white;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 6px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--oracle-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.5rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            margin-bottom: 15px;
        }

        .loading-subtext {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        .progress-bar {
            width: 400px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--oracle-red), var(--gold-accent));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 900;
            color: var(--oracle-red);
            font-family: 'Outfit', sans-serif;
            line-height: 1;
        }

        .stat-label {
            font-size: 0.95rem;
            color: #666;
            margin-top: 10px;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            padding: 40px;
            color: #777;
            font-size: 0.95rem;
            border-top: 2px solid var(--light-gray);
            margin-top: 50px;
        }

        .feature-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            border: 2px solid var(--light-gray);
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            border-color: var(--oracle-red);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .feature-icon {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .feature-content h4 {
            font-family: 'Outfit', sans-serif;
            color: var(--deep-navy);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .feature-content p {
            font-size: 0.9rem;
            color: #666;
        }

        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            .main-content {
                padding: 30px;
            }
            .workflow-steps {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        

        const { useState, useEffect } = React;
